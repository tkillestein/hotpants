name: Performance Benchmarks

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      build_type: Release
      upload_artifact: true

  benchmark:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git SHA/branch detection

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python dependencies
        run: uv sync --group test

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: hotpants-build-Release
          path: build

      - name: Make binary executable
        run: chmod +x build/hotpants

      - name: Run benchmarks
        run: |
          uv run python benchmark_suite.py \
            --hotpants ./build/hotpants \
            --trials 2 \
            --results-dir ./benchmark_results
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/build:$LD_LIBRARY_PATH

      - name: Generate benchmark report
        if: always()
        run: |
          uv run python benchmark_suite.py \
            --hotpants ./build/hotpants \
            --report-only \
            --results-dir ./benchmark_results > benchmark_report.txt
          cat benchmark_report.txt

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            benchmark_results/
            benchmark_report.txt
          retention-days: 90

      - name: Comment PR with results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('benchmark_report.txt', 'utf8');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## Performance Benchmark Results\n\n```\n' + report + '\n```'
            });

      - name: Check for regressions
        run: |
          uv run python benchmark_suite.py \
            --hotpants ./build/hotpants \
            --report-only \
            --results-dir ./benchmark_results \
            --regression-threshold 10.0
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/build:$LD_LIBRARY_PATH
